name: apkjiagu
description: "APK 加固工具 - 基于 dpt-shell 的可视化加固与签名工具"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  desktop_drop: ^0.5.0
  file_picker: ^8.1.2
  provider: ^6.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  archive: ^3.6.1
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tools/
    - assets/tools/shell-files/
    - assets/tools/shell-files/dex/
    - assets/tools/shell-files/libs/arm/
    - assets/tools/shell-files/libs/arm64/
    - assets/tools/shell-files/libs/x86/
    - assets/tools/shell-files/libs/x86_64/
